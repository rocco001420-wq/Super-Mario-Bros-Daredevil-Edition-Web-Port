<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<title>Super Mario Bros.</title>

<style>
* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: "Segoe UI", sans-serif;
}

#game-container {
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
}

canvas {
    display: block;
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 256 / 240;
    object-fit: contain;
}
</style>
</head>

<body>

<div id="game-container">
    <canvas id="c2canvas" width="256" height="240"></canvas>
</div>

<script src="jquery-3.4.1.min.js"></script>
<script src="c2runtime.js"></script>

<script>
jQuery(document).ready(function () {

    // Optional: fixes some black screen issues on some PCs
    if (typeof cr_setRuntimeProperty !== "undefined") {
        cr_setRuntimeProperty("forceCanvas2D", true);
    }

    cr_createRuntime("c2canvas");
});

// Pause game when tab is hidden
function onVisibilityChanged() {
    if (typeof cr_setSuspended !== "undefined") {
        cr_setSuspended(!!document.hidden);
    }
}
document.addEventListener("visibilitychange", onVisibilityChanged);
</script>

</body>
</html>
