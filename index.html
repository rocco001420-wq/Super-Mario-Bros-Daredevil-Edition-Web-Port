<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>Game</title>

<style>
html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
}

#wrap {
    width: 100%;
    height: 100%;
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;
}

canvas {
    max-width: 100%;
    max-height: 100%;
}

/* UI */
#ui {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

.btn {
    width: 70px;
    height: 70px;
    background: rgba(0,0,0,0.7);
    border: 2px solid white;
    color: white;
    font-size: 18px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    pointer-events: auto;
}

#left {
    position: absolute;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
}

#right {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
}
</style>
</head>

<body>

<div id="wrap">
    <canvas id="c2canvas" width="256" height="240"></canvas>

    <div id="ui">
        <div id="left">
            <div class="btn" id="leftBtn">←</div>
            <div class="btn" id="rightBtn">→</div>
        </div>

        <div id="right">
            <div class="btn" id="jumpBtn">Z</div>
            <div class="btn" id="runBtn">X</div>
        </div>
    </div>
</div>

<script src="jquery-3.4.1.min.js"></script>
<script src="c2runtime.js"></script>

<script>
jQuery(document).ready(function () {

    cr_createRuntime("c2canvas");

    const canvas = document.getElementById("c2canvas");

    function touchDown() {
        const rect = canvas.getBoundingClientRect();

        const e = new TouchEvent("touchstart", {
            bubbles: true,
            cancelable: true,
            touches: [new Touch({
                identifier: Date.now(),
                target: canvas,
                clientX: rect.left + rect.width / 2,
                clientY: rect.top + rect.height / 2
            })]
        });

        canvas.dispatchEvent(e);
    }

    function touchUp() {
        const e = new TouchEvent("touchend", {
            bubbles: true,
            cancelable: true,
            touches: []
        });

        canvas.dispatchEvent(e);
    }

    function bind(id) {
        const btn = document.getElementById(id);

        btn.addEventListener("touchstart", (e) => {
            e.preventDefault();
            touchDown();
        });

        btn.addEventListener("touchend", (e) => {
            e.preventDefault();
            touchUp();
        });

        btn.addEventListener("mousedown", (e) => {
            e.preventDefault();
            touchDown();
        });

        btn.addEventListener("mouseup", (e) => {
            e.preventDefault();
            touchUp();
        });
    }

    bind("leftBtn");
    bind("rightBtn");
    bind("jumpBtn");
    bind("runBtn");

});
</script>

</body>
</html>
