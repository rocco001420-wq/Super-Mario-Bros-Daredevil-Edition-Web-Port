<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<title>Super Mario Bros.</title>

<style>
* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    user-select: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: "Segoe UI", sans-serif;
}

#game-container {
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

canvas {
    display: block;
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 256 / 240;
    object-fit: contain;
}

/* ================= CONTROLS ================= */

#mobile-controls {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

#left-controls {
    position: absolute;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    pointer-events: auto;
}

#right-controls {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 10px;
    pointer-events: auto;
}

.control-btn {
    width: 60px;
    height: 60px;
    background: rgba(0, 0, 0, 0.75);
    border: 2px solid rgba(255, 255, 255, 0.85);
    border-radius: 12px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.7);
}

.control-btn:active {
    background: rgba(255, 255, 255, 0.15);
    transform: scale(0.95);
}

/* show always on mobile, hide only real desktop */
@media (min-width: 1024px) and (pointer: fine) {
    #mobile-controls {
        display: none;
    }
}
</style>
</head>

<body>

<div id="game-container">
    <canvas id="c2canvas" width="256" height="240"></canvas>

    <div id="mobile-controls">
        <div id="left-controls">
            <div class="control-btn" id="btnX">X</div>
            <div class="control-btn" id="btnZ">Z</div>
        </div>

        <div id="right-controls">
            <div class="control-btn" id="btnLeft">←</div>
            <div class="control-btn" id="btnRight">→</div>
        </div>
    </div>
</div>

<script src="jquery-3.4.1.min.js"></script>
<script src="c2runtime.js"></script>

<script>
jQuery(document).ready(function () {

    if (typeof cr_setRuntimeProperty !== "undefined") {
        cr_setRuntimeProperty("forceCanvas2D", true);
    }

    cr_createRuntime("c2canvas");

    const canvas = document.getElementById("c2canvas");

    function fireMouse(type) {
        const rect = canvas.getBoundingClientRect();

        const event = new MouseEvent(type, {
            bubbles: true,
            cancelable: true,
            clientX: rect.left + rect.width / 2,
            clientY: rect.top + rect.height / 2
        });

        canvas.dispatchEvent(event);
    }

    function bind(btnId) {
        const btn = document.getElementById(btnId);

        btn.addEventListener("touchstart", (e) => {
            e.preventDefault();
            fireMouse("mousedown");
        });

        btn.addEventListener("touchend", (e) => {
            e.preventDefault();
            fireMouse("mouseup");
        });

        btn.addEventListener("mousedown", (e) => {
            e.preventDefault();
            fireMouse("mousedown");
        });

        btn.addEventListener("mouseup", (e) => {
            e.preventDefault();
            fireMouse("mouseup");
        });
    }

    bind("btnX");
    bind("btnZ");
    bind("btnLeft");
    bind("btnRight");
});

function onVisibilityChanged() {
    if (typeof cr_setSuspended !== "undefined") {
        cr_setSuspended(!!document.hidden);
    }
}

document.addEventListener("visibilitychange", onVisibilityChanged);
</script>

</body>
</html>
