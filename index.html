<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<meta http-equiv="X-UA-Compatible" content="IE=edge,chrome=1" />
<title>Super Mario Bros.</title>

<style>
* {
    padding: 0;
    margin: 0;
    box-sizing: border-box;
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
}

html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: black;
    font-family: "Segoe UI", sans-serif;
    touch-action: none;
}

#game-container {
    width: 100%;
    height: 100%;
    background: black;
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
}

canvas {
    display: block;
    width: auto;
    height: auto;
    max-width: 100%;
    max-height: 100%;
    aspect-ratio: 256 / 240;
    object-fit: contain;
}

/* ================= MOBILE CONTROLS ================= */

#mobile-controls {
    position: absolute;
    width: 100%;
    height: 100%;
    pointer-events: none;
}

/* D-PAD */
#dpad {
    position: absolute;
    bottom: 20px;
    left: 20px;
    display: grid;
    grid-template-columns: 70px 70px 70px;
    grid-template-rows: 70px 70px 70px;
    gap: 8px;
    pointer-events: auto;
}

#dpad .empty {
    width: 70px;
    height: 70px;
}

/* BUTTONS */
#buttons {
    position: absolute;
    bottom: 20px;
    right: 20px;
    display: flex;
    gap: 12px;
    pointer-events: auto;
}

/* START */
#start-controls {
    position: absolute;
    bottom: 120px;
    left: 50%;
    transform: translateX(-50%);
    pointer-events: auto;
}

/* Button styling */
.control-btn {
    width: 70px;
    height: 70px;
    background: rgba(0, 0, 0, 0.75);
    border: 2px solid rgba(255, 255, 255, 0.95);
    border-radius: 12px;
    color: white;
    font-size: 20px;
    font-weight: bold;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    -webkit-backdrop-filter: blur(4px);
}

.control-btn:active {
    background: rgba(255, 255, 255, 0.2);
    transform: scale(0.95);
}

/* Hide on desktop */
@media (min-width: 1024px) and (pointer:fine) {
    #mobile-controls {
        display: none;
    }
}
</style>
</head>

<body>

<div id="game-container">
    <canvas id="c2canvas" width="256" height="240"></canvas>

    <!-- MOBILE CONTROLS -->
    <div id="mobile-controls">

        <!-- DPAD -->
        <div id="dpad">
            <div class="empty"></div>
            <div class="control-btn" id="btnUp">↑</div>
            <div class="empty"></div>

            <div class="control-btn" id="btnLeft">←</div>
            <div class="empty"></div>
            <div class="control-btn" id="btnRight">→</div>

            <div class="empty"></div>
            <div class="control-btn" id="btnDown">↓</div>
            <div class="empty"></div>
        </div>

        <!-- ACTION BUTTONS -->
        <div id="buttons">
            <div class="control-btn" id="btnX">X</div>
            <div class="control-btn" id="btnZ">Z</div>
        </div>

        <!-- START BUTTON -->
        <div id="start-controls">
            <div class="control-btn" id="btnEnter">ENTER</div>
        </div>

    </div>
</div>

<script src="jquery-3.4.1.min.js"></script>
<script src="c2runtime.js"></script>

<script>
jQuery(document).ready(function () {

    cr_createRuntime("c2canvas");

    let runtime = null;
    let keyboard = null;

    function findKeyboardInstance(rt) {
        if (!rt || !rt.types)
            return null;

        for (let t in rt.types) {
            if (!rt.types.hasOwnProperty(t))
                continue;

            let typeObj = rt.types[t];
            if (!typeObj || !typeObj.instances || !typeObj.instances.length)
                continue;

            for (let i = 0; i < typeObj.instances.length; i++) {
                let inst = typeObj.instances[i];

                if (inst && inst.keyMap && inst.keyMap.length === 256) {
                    return inst;
                }
            }
        }

        return null;
    }

    function setKeyDown(keyCode, isDown) {
        if (!keyboard)
            return;

        keyboard.keyMap[keyCode] = isDown;
        keyboard.triggerKey = keyCode;
    }

    function bindButton(btnId, keyCode) {
        const btn = document.getElementById(btnId);

        function press(e) {
            e.preventDefault();
            setKeyDown(keyCode, true);
        }

        function release(e) {
            e.preventDefault();
            setKeyDown(keyCode, false);
        }

        btn.addEventListener("touchstart", press, { passive: false });
        btn.addEventListener("touchend", release, { passive: false });
        btn.addEventListener("touchcancel", release, { passive: false });

        btn.addEventListener("mousedown", press);
        btn.addEventListener("mouseup", release);
        btn.addEventListener("mouseleave", release);
    }

    let tries = 0;
    const timer = setInterval(function () {
        tries++;

        runtime = window.cr_getC2Runtime ? window.cr_getC2Runtime() : null;

        if (runtime && !keyboard) {
            keyboard = findKeyboardInstance(runtime);
        }

        if (keyboard) {
            clearInterval(timer);

            // Arrow Keys
            bindButton("btnLeft", 37);
            bindButton("btnRight", 39);
            bindButton("btnUp", 38);
            bindButton("btnDown", 40);

            // Z / X
            bindButton("btnZ", 90);
            bindButton("btnX", 88);

            // Enter
            bindButton("btnEnter", 13);

            console.log("Mobile controls patched successfully!");
        }

        if (tries > 200) {
            clearInterval(timer);
            console.log("FAILED: Could not locate Construct 2 keyboard plugin.");
        }

    }, 50);
});

function onVisibilityChanged() {
    if (typeof cr_setSuspended !== "undefined") {
        cr_setSuspended(!!document.hidden);
    }
}

document.addEventListener("visibilitychange", onVisibilityChanged);
</script>

</body>
</html>
